<!doctype html>
<html class="no-js" lang="en">

<head>
  <meta charset="utf-8">
  <title>Tamagotchi Simulator</title>
  <meta name="description" content="This site will serve as the hub for many sub responsive layouts">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">

  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" href="icon.png">
  <!-- Place favicon.ico in the root directory -->

  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/main.css">

  <meta name="theme-color" content="#fafafa">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&family=Jersey+10&display=swap" rel="stylesheet">
</head>

<body>
  <div class="device">
  <div class="screen">
    <div class="egg-wrapper">
    <!-- Egg background (always visible) -->
    <img id="egg" src="img/egg.png" />

    <!-- Pet layered on top -->
    <img id="pet" src="img/normal.png" />

    <!-- Buttons ON the egg -->
    <div class="btn" id="feed-btn" data-tooltip="Play with your Tamagotchi!">
      <img id="play" src="img/nbutton1.png" alt=""/>
    </div>

    <div class="btn" id="play-btn" data-tooltip="Feed your Tamagotchi!">
      <img id="feed" src="img/nbutton2.png" alt=""/>
    </div>

    <div class="btn" id="sleep-btn" data-tooltip="Put your Tamagotchi to bed!">
      <img id="sleep" src="img/nbutton3.png" alt=""/>
</div>  </div>

<!-- WELCOME POPUP -->
<div id="welcome-popup">
  <div class="name-box">
    <p>Welcome to Tamagotchi Life!</p>
      <br>Here you will be able to take care of your very own virtual pet. They will need a lot of care and attention.<br>
      Feed it, play with it, and help it grow!
      <p>Do you agree to take care of it?</p>
    <button id="agree-btn">I Agree</button>
  </div>
</div>

<div id="overwhelmed-popup">
  <div class="name-box">
    <p id="overwhelmed-text">...</p>
    <button id="overwhelmed-btn">Okay</button>
  </div>
</div>

    <div class="dialogue-box">
    <p id="mood">...</p>
  </div>

  <div id="name-popup">
    <div class="name-box">
      <p>Name your Tamagotchi!</p>
      <label for="pet-name-input">They shall be called:</label>
      <input type="text" id="pet-name-input" placeholder="Enter name..." />
      <button id="start-btn">Start</button>
    </div>
  </div>
  
  <audio id="bg-music" loop>
  <source src="audio/audio1.mp3" type="audio/mpeg">
</audio>

<button id="sound-toggle">🔊</button>

  <script src="js/main.js"></script>
</body>

</html>
